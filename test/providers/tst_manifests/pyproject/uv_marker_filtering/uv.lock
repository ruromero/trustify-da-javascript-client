version = 1
requires-python = ">=3.8"

[[package]]
name = "marker-test"
version = "1.0.0"
source = { virtual = "." }
dependencies = [
    { name = "click" },
    { name = "six" },
]

[[package]]
name = "click"
version = "8.3.1"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "colorama", marker = "sys_platform == 'win32'" },
]

[[package]]
name = "colorama"
version = "0.4.6"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "six"
version = "1.16.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "win32-setctime"
version = "1.1.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pyreadline3"
version = "3.4.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pyobjc"
version = "10.1"
source = { registry = "https://pypi.org/simple" }
